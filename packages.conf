# packages.conf — Package lists for the squashfs minimal root and full install
#
# SQUASHFS_BASE_PACKAGES: Included in the minimal squashfs boot image.
#   Keep this minimal — just enough to boot, network, and provision.
#
# FULL_INSTALL_PACKAGES: Installed onto the data disk during first-boot.
#   This is the complete system. Add your desired packages here.

SQUASHFS_BASE_PACKAGES=(
    # Core
    base
    linux-hardened

    # Filesystem + crypto
    btrfs-progs
    cryptsetup
    dosfstools
    e2fsprogs

    # TPM2
    tpm2-tools
    tpm2-tss

    # Boot
    systemd-ukify

    # Networking (emergency access is via serial console, provisioning needs curl)
    curl

    # Azure disk metadata
    gptfdisk
    udftools

    # System config
    sudo
    nano
    python

    # Security
    apparmor

    # Provisioning tools
    arch-install-scripts
    squashfs-tools

    # Early memory pressure relief during squashfs bootstrap
    zram-generator
)

# Explicitly block firmware bundles that are not needed for Azure VMs.
# This is consumed by temporary pacman.conf IgnorePkg in build/provision scripts.
PACMAN_IGNORE_PACKAGES=(
    linux-firmware
)

FULL_INSTALL_PACKAGES=(
    # Everything from base
    "${SQUASHFS_BASE_PACKAGES[@]}"

    # Development
    base-devel

    # Additional security
    wireguard-tools
    audit
    firewalld

    # Additional tools
    # Add your packages here
)
