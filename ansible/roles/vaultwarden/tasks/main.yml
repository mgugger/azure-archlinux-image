---
- name: Install vaultwarden
  community.general.pacman:
    name:
      - vaultwarden
      - vaultwarden-web
    state: present
    update_cache: false
  environment:
    http_proxy: "http://127.0.0.1:8888"
    https_proxy: "http://127.0.0.1:8888"
    HTTP_PROXY: "http://127.0.0.1:8888"
    HTTPS_PROXY: "http://127.0.0.1:8888"

- name: Ensure vaultwarden managed directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vaultwarden_user }}"
    group: "{{ vaultwarden_group }}"
    mode: '0750'
  loop: "{{ vaultwarden_managed_paths }}"

- name: Check whether restic root files list exists for vaultwarden registration
  ansible.builtin.stat:
    path: "{{ vaultwarden_restic_root_files_path }}"
  register: vaultwarden_restic_root_files_stat

- name: Register vaultwarden backup paths in restic root files list
  ansible.builtin.lineinfile:
    path: "{{ vaultwarden_restic_root_files_path }}"
    line: "{{ item }}"
    state: present
    insertafter: EOF
  loop: "{{ vaultwarden_backup_paths }}"
  when: vaultwarden_restic_root_files_stat.stat.exists

- name: Fix ownership on restored vaultwarden trees
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vaultwarden_user }}"
    group: "{{ vaultwarden_group }}"
    recurse: true
  loop: "{{ vaultwarden_managed_paths }}"

- name: Ensure vaultwarden service drop-in directory exists
  ansible.builtin.file:
    path: /usr/lib/systemd/system/vaultwarden.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure vaultwarden service proxy environment
  ansible.builtin.copy:
    src: http_proxy.conf
    dest: /usr/lib/systemd/system/vaultwarden.service.d/http_proxy.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd daemon
    - Restart vaultwarden

- name: Apply vaultwarden systemd common hardening
  ansible.builtin.copy:
    src: 00-hardening-common.conf
    dest: /usr/lib/systemd/system/vaultwarden.service.d/00-hardening-common.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd daemon
    - Restart vaultwarden

- name: Apply vaultwarden service specific hardening
  ansible.builtin.copy:
    src: 10-hardening-local.conf
    dest: /usr/lib/systemd/system/vaultwarden.service.d/10-hardening-local.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd daemon
    - Restart vaultwarden

- name: Check whether vaultwarden env file already exists
  ansible.builtin.stat:
    path: "{{ vaultwarden_env_file }}"
  register: vaultwarden_env_stat

- name: Check whether vaultwarden env backup exists
  ansible.builtin.stat:
    path: "{{ vaultwarden_env_file }}.bak"
  register: vaultwarden_env_backup_stat

- name: Write default vaultwarden env file only when missing
  ansible.builtin.copy:
    dest: "{{ vaultwarden_env_file }}"
    owner: root
    group: "{{ vaultwarden_group }}"
    mode: '0640'
    force: false
    content: |
      DOMAIN=https://vault.example.com
      ROCKET_ADDRESS=127.0.0.1
      ROCKET_PORT=8000
      DATA_FOLDER=/var/lib/vaultwarden
      LOG_FILE=/var/log/vaultwarden/vaultwarden.log
  when: not vaultwarden_env_stat.stat.exists and not vaultwarden_env_backup_stat.stat.exists
  notify: Restart vaultwarden

- name: Enable and start vaultwarden
  ansible.builtin.systemd:
    name: "{{ vaultwarden_service_name }}"
    enabled: true
    state: started
